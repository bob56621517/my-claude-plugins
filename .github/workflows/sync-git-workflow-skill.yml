name: Sync git-workflow skill to platform plugins

on:
  push:
    branches: [main]
    paths:
      - '.claude/skills/git-workflow/**'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync skill to github plugin
        run: |
          mkdir -p github/skills/git-workflow
          cp -r .claude/skills/git-workflow/* github/skills/git-workflow/

      - name: Sync skill to gitee plugin
        run: |
          mkdir -p gitee/skills/git-workflow
          cp -r .claude/skills/git-workflow/* gitee/skills/git-workflow/

      - name: Sync skill to gitlab plugin
        run: |
          mkdir -p gitlab/skills/git-workflow
          cp -r .claude/skills/git-workflow/* gitlab/skills/git-workflow/

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: sync git-workflow skill to platform plugins'
